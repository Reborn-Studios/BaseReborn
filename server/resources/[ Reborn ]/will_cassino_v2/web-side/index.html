<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free/css/all.min.css"
    />
    <link rel="stylesheet" href="styles/style.css" />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
      integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
      crossorigin="anonymous"
    ></script>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <!-- <script src="nui://game/ui/jquery.js" type="text/javascript"></script> -->
  </head>
  <body>
    <div
      class="hud hud--hidden hud--collapsed"
      id="casinoHud"
      aria-live="polite"
    >
      <button
        class="hudToggle"
        id="hudToggle"
        type="button"
        aria-label="Minimizar painel"
      >
        G
      </button>

      <div class="hudHeader">
        <img src="./img/cassinologo.png" alt="Cassino" class="hudLogo" />
        <div class="hudTitle">
          <div class="hudName">Cassino</div>
          <div class="hudSubtitle">Informações</div>
        </div>
      </div>

      <div class="hudStats">
        <div class="stat">
          <div class="statLabel">Fichas</div>
          <div class="statValue" id="mychips">0</div>
        </div>
        <div class="stat">
          <div class="statLabel">Jogo</div>
          <div class="statValue" id="activeGame">—</div>
        </div>
        <div class="stat">
          <div class="statLabel">Aposta</div>
          <div class="statValue" id="currentBet">—</div>
        </div>
      </div>

      <div class="hudSectionTitle">Preços</div>
      <div class="hudGames" id="gamePrices">
        <div class="gameRow" data-game="Blackjack">
          <div class="gameLeft">
            <i class="fa-solid fa-clover gameIcon" aria-hidden="true"></i>
            <span class="gameName">Blackjack</span>
          </div>
          <div class="gamePrice" id="priceBlackjack">—</div>
        </div>
        <div class="gameRow" data-game="Roleta">
          <div class="gameLeft">
            <i class="fa-solid fa-circle-dot gameIcon" aria-hidden="true"></i>
            <span class="gameName">Roleta</span>
          </div>
          <div class="gamePrice" id="priceRoleta">—</div>
        </div>
        <div class="gameRow" data-game="Slots">
          <div class="gameLeft">
            <i class="fa-solid fa-coins gameIcon" aria-hidden="true"></i>
            <span class="gameName">Slots</span>
          </div>
          <div class="gamePrice" id="priceSlots">—</div>
        </div>
        <div class="gameRow" data-game="Poker">
          <div class="gameLeft">
            <i class="fa-solid fa-diamond gameIcon" aria-hidden="true"></i>
            <span class="gameName">Poker</span>
          </div>
          <div class="gamePrice" id="pricePoker">—</div>
        </div>
        <div class="gameRow" data-game="InsideTrack">
          <div class="gameLeft">
            <i class="fa-solid fa-horse gameIcon" aria-hidden="true"></i>
            <span class="gameName">Corrida a cavalo</span>
          </div>
          <div class="gamePrice" id="priceInsideTrack">—</div>
        </div>
      </div>

      <div class="hudSectionTitle">Controles</div>
      <div class="hudControls" id="hudControls">
        <div class="keyCard" id="visionkey">
          <span class="keyBadge">E</span>
          <span class="keyAction">VISÃO</span>
        </div>
        <div class="keyCard" id="spacekey">
          <span class="keyBadge">SPACE</span>
          <span class="keyAction">APOSTAR</span>
        </div>
        <div class="keyCard" id="enterkey">
          <span class="keyBadge">ENTER</span>
          <span class="keyAction">COLOCAR</span>
        </div>
        <div class="keyCard" id="leftkey">
          <span class="keyBadge">BACK</span>
          <span class="keyAction">SAIR</span>
        </div>
      </div>

      <div class="hudExtras" id="hudExtras">
        <div class="extraCard is-hidden" id="handInfo">MÃO: —</div>
        <div class="extraCard is-hidden" id="dealerInfo">DEALER: —</div>
      </div>

      <div class="hudFooter">
        <div class="hudHint">
          <i class="fa-solid fa-keyboard hudHintIcon" aria-hidden="true"></i>
          <span class="hudHintText">G: minimizar</span>
        </div>
        <div class="hudTimer" id="hudTimer">
          <i class="fa-regular fa-clock clock" aria-hidden="true"></i>
          <span class="clockText">00:30</span>
        </div>
      </div>

      <span id="audio"></span>
    </div>
    <script src="./js/script.js"></script>
  </body>
</html>
