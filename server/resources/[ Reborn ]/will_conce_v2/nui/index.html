<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>WILL CONCE V2</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" type="text/css" media="screen" href="styles.css" />
    <script src="nui://game/ui/jquery.js" type="text/javascript"></script>
    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
  </head>
  <body>
    <div class="container2" style="display: none">
      <div class="backgorund-shadow"></div>
      <div class="backgorund-shadow2"></div>
      <div
        class="init-painel absolute right-2/4 text-white text-center translate-x-2/4"
        style="display: none"
      >
        <div class="flex justify-between mb-4">
          <div class="flex gap-2">
            <div class="hex-icon">
              <svg
                viewBox="0 0 40 40"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <polygon
                  points="20,2 37,11 37,29 20,38 3,29 3,11"
                  stroke="#00d4bc"
                  stroke-width="1.5"
                  fill="rgba(0,212,188,0.8)"
                  style="position: relative; box-shadow: 20px 20px 20px black"
                >
                  <img
                    src="./assets/vehicle.svg"
                    style="position: absolute"
                    width="25"
                    height="25"
                  />
                </polygon>
              </svg>
            </div>
            <div>
              <h3 class="font-semibold text-sm text-start text-white/50">
                ESCOLHA UMA CATEGORIA
              </h3>
              <h2 class="title font-bold text-3xl">CONCESSIONÁRIA</h2>
            </div>
          </div>
          <div class="veh-select-header-right" style="margin-bottom: 0">
            <div class="close-group">
              <div class="close-text-stack">
                <span class="close-label" style="text-align: end">Fechar</span>
                <span class="close-sub">Pressione ESC</span>
              </div>
              <div class="esc-btn">ESC</div>
            </div>
          </div>
        </div>
        <div class="categories grid grid-cols-3 gap-4"></div>
      </div>
      <div
        class="vehs-painel absolute right-2/4 text-white text-center translate-x-2/4"
        style="display: none"
      >
        <div class="backArrow absolute cursor-pointer">
          <img src="assets/arrow.png" alt="arrow" onclick="backScreen()" />
        </div>
        <div class="flex justify-between">
          <div class="flex gap-2 mb-4">
            <div class="hex-icon">
              <svg
                viewBox="0 0 40 40"
                fill="none"
                xmlns="http://www.w3.org/2000/svg"
              >
                <polygon
                  points="20,2 37,11 37,29 20,38 3,29 3,11"
                  stroke="#00d4bc"
                  stroke-width="1.5"
                  fill="rgba(0,212,188,0.8)"
                  style="position: relative; box-shadow: 20px 20px 20px black"
                >
                  <img
                    src="./assets/vehicle.svg"
                    style="position: absolute"
                    width="25"
                    height="25"
                  />
                </polygon>
              </svg>
            </div>
            <div class="flex flex-col items-start">
              <h2 class="font-semibold text-sm text-white/60">
                SELECIONE UM VEÍCULO
              </h2>
              <h2 class="title font-bold text-3xl">SPORTCAR</h2>
            </div>
          </div>
          <div class="veh-select-header-right" style="margin-bottom: 0">
            <div class="close-group">
              <div class="close-text-stack">
                <span class="close-label" style="text-align: end">Fechar</span>
                <span class="close-sub">Pressione ESC</span>
              </div>
              <div class="esc-btn">ESC</div>
            </div>
          </div>
        </div>
        <div class="vehicles grid grid-cols-3 gap-8"></div>
      </div>
    </div>
    <div class="veh-infos-container relative h-full" style="display: none">
      <div class="absolute right-0 text-white text-center right-6">
        <div
          class="veh-select-header-right justify-end mt-4"
          style="margin-bottom: 1.5vh"
        >
          <div class="close-group">
            <div class="close-text-stack">
              <span class="close-label" style="text-align: end">Fechar</span>
              <span class="close-sub">Pressione ESC</span>
            </div>
            <div class="esc-btn">ESC</div>
          </div>
        </div>
        <div class="vehicle-infos"></div>
      </div>
    </div>
    <div class="test-drive absolute right-8 top-1/2"></div>
    <div
      class="admMenu absolute right-1/2 top-1/4 translate-x-2/4"
      style="display: none"
    >
      <div class="content-border">
        <div
          class="bg-slate-600 p-3 text-white border-sky-700 border-2 rounded-xl"
        >
          <h1 class="font-bold text-center">CONTROLE ADMIN</h1>
          <div class="admin-options flex">
            <div
              class="admin-option mx-2 p-2 rounded-lg hover:bg-slate-700 cursor-pointer"
              id="addstock"
              onclick="changeAdmMenu(this.id)"
            >
              Adicionar estoque
            </div>
            <div
              class="admin-option mx-2 p-2 rounded-lg hover:bg-slate-700 cursor-pointer"
              id="addveh"
              onclick="changeAdmMenu(this.id)"
            >
              Adicionar veiculo
            </div>
            <div
              class="admin-option mx-2 p-2 rounded-lg hover:bg-slate-700 cursor-pointer"
              id="remveh"
              onclick="changeAdmMenu(this.id)"
            >
              Remover veiculo
            </div>
          </div>
          <div class="container-adm my-3 flex flex-col items-center">
            <label class="relative block">
              <span class="text-lg">Passaporte</span>
              <input
                class="user placeholder:italic text-black block bg-white border border-slate-300 rounded-md py-2 pl-3 pr-3 shadow-sm focus:outline-none focus:border-sky-500 focus:ring-sky-500 focus:ring-1 sm:text-sm"
                placeholder="1"
                type="text"
                name="search"
              />
            </label>
            <label class="relative block my-5">
              <span class="text-lg">Veiculo</span>
              <input
                class="vehicle-user placeholder:italic text-black block bg-white border border-slate-300 rounded-md py-2 pl-3 pr-3 shadow-sm focus:outline-none focus:border-sky-500 focus:ring-sky-500 focus:ring-1 sm:text-sm"
                placeholder="Panto"
                type="text"
                name="search"
              />
            </label>
            <div
              class="button-order flex justify-center p-3 text-green-400 hover:text-white"
            >
              <button onclick="userVehFunc()">CONFIRMAR</button>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="index.js"></script>
  </body>
</html>
