<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <script src="nui://game/ui/jquery.js" type="text/javascript"></script>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"></script>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://site-assets.fontawesome.com/releases/v6.5.1/css/all.css"
    />
  </head>
  <body>
    <div id="elevator" class="container"></div>
    <div id="blips"></div>
    <div id="safezone">
      <img src="./assets/shield.svg" alt="" id="safe-shield" />
      Safezone
    </div>
    <div id="groups-panel" class="groups-container">
      <div class="groups-header">
        <h3 class="groups-title">Controle de Grupos</h3>
        <button id="groups-close" class="groups-close-btn">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <div class="groups-search">
        <input
          type="text"
          id="groups-search-input"
          placeholder="Pesquisar grupo..."
          class="groups-search-field"
        />
      </div>
      <div class="groups-list" id="groups-list"></div>
      <div class="groups-footer">
        <button id="groups-save" class="groups-btn groups-btn-save">
          Salvar
        </button>
        <button id="groups-cancel" class="groups-btn groups-btn-cancel">
          Cancelar
        </button>
      </div>
    </div>
    <script src="elevator.js"></script>
    <script src="groups.js"></script>
    <script src="script.js"></script>
  </body>
</html>
